<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Workshop Poll</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
:root {
  --color-bg: #ffffff;
  --color-text: #1a1a1a;
  --color-muted: #737373;
  --color-accent: #2383e2;
  --color-success: #0d8478;
  --color-purple: #7c3aed;
  --color-pink: #db2777;
  --color-orange: #ea580c;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--color-bg);
  color: var(--color-text);
  overflow-x: hidden;
}

.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}
.blob-1 { width: 400px; height: 400px; top: -100px; right: -100px; background: radial-gradient(circle, #7c3aed, #c026d3); }
.blob-2 { width: 300px; height: 300px; bottom: -60px; left: -60px; background: radial-gradient(circle, #db2777, #ea580c); }

.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  max-width: 480px;
  margin: 0 auto;
}

.workshop-tag {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-muted);
  margin-bottom: 12px;
}

.poll-title {
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  margin-bottom: 24px;
  letter-spacing: -0.01em;
}

.nickname-wrapper {
  width: 100%;
  margin-bottom: 20px;
}

.nickname-input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid rgba(0,0,0,0.1);
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 1rem;
  background: #f7f7f5;
  color: var(--color-text);
  text-align: center;
  transition: border-color 0.2s;
}
.nickname-input:focus {
  outline: none;
  border-color: var(--color-accent);
  background: #fff;
}
.nickname-input::placeholder { color: #aaa; }

.options-list {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 12px;
}

.option-btn {
  width: 100%;
  min-height: 64px;
  padding: 14px 20px;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 1.1rem;
  font-weight: 700;
  color: #ffffff;
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  line-height: 1.3;
  text-align: center;
}
.option-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
.option-btn:active { transform: scale(0.97); }
.option-btn:focus-visible { outline: 3px solid var(--color-text); outline-offset: 3px; }

.btn-blue   { background: linear-gradient(135deg, #2383e2, #1d6fc5); }
.btn-green  { background: linear-gradient(135deg, #0d8478, #0a6b60); }
.btn-purple { background: linear-gradient(135deg, #7c3aed, #6326c9); }
.btn-pink   { background: linear-gradient(135deg, #db2777, #be1e67); }
.btn-orange { background: linear-gradient(135deg, #ea580c, #c74b0a); }
.btn-teal   { background: linear-gradient(135deg, #0891b2, #0770a0); }

.thank-you {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 16px;
  animation: fadeIn 0.4s ease;
}
.thank-you.visible { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.thank-icon { font-size: 4rem; }
.thank-message { font-size: 1.4rem; font-weight: 700; }
.thank-sub { font-size: 1rem; color: var(--color-muted); }
.countdown { font-size: 0.9rem; color: var(--color-muted); margin-top: 8px; }
.countdown span { font-weight: 700; color: var(--color-text); }
</style>
</head>
<body>
<div class="blob blob-1" aria-hidden="true"></div>
<div class="blob blob-2" aria-hidden="true"></div>

<div class="page" id="poll-page">
  <div class="workshop-tag">🎯 Workshop Poll</div>
  <h1 class="poll-title" id="poll-question">Loading poll...</h1>

  <div class="nickname-wrapper">
    <input
      class="nickname-input"
      type="text"
      id="nickname-input"
      placeholder="Your name (optional)"
      maxlength="40"
      aria-label="Your name (optional)"
      autocomplete="off"
    />
  </div>

  <div class="options-list" id="options-list" role="list">
    <!-- Options injected by JS -->
  </div>
</div>

<div class="page thank-you" id="thank-you-page" aria-live="polite">
  <div class="thank-icon">✅</div>
  <div class="thank-message" id="thank-message">Thanks! Your vote was counted.</div>
  <div class="thank-sub">Results are showing live on the workshop screen.</div>
  <div class="countdown">Closing in <span id="countdown-num">3</span>…</div>
</div>

<script>
const POLLS = {
  icebreaker: {
    question: "How much AI do you currently use?",
    options: [
      { key: 'never',        label: '🙈 Never',       btnClass: 'btn-blue' },
      { key: 'occasionally', label: '🤔 Occasionally', btnClass: 'btn-purple' },
      { key: 'daily',        label: '🚀 Daily',        btnClass: 'btn-green' }
    ]
  },
  timesink: {
    question: "Which of these tasks takes most of your time?",
    options: [
      { key: 'writing',   label: '📝 Writing',   btnClass: 'btn-blue' },
      { key: 'research',  label: '🔍 Research',  btnClass: 'btn-purple' },
      { key: 'reporting', label: '📊 Reporting', btnClass: 'btn-pink' },
      { key: 'planning',  label: '📅 Planning',  btnClass: 'btn-orange' }
    ]
  },
  spaces: {
    question: "Which use case interests you most for Spaces?",
    options: [
      { key: 'planning', label: '📅 Content Planning', btnClass: 'btn-blue' },
      { key: 'grants',   label: '💰 Grant Writing',    btnClass: 'btn-green' },
      { key: 'pcb',      label: '🔌 PCB / Technical',  btnClass: 'btn-purple' },
      { key: 'social',   label: '📱 Social Media',     btnClass: 'btn-pink' }
    ]
  }
};

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

const pollId = getParam('q') || 'icebreaker';
const poll = POLLS[pollId] || POLLS['icebreaker'];
const storageKey = 'workshopPoll_' + pollId;

document.getElementById('poll-question').textContent = poll.question;

const optionsList = document.getElementById('options-list');
poll.options.forEach(opt => {
  const btn = document.createElement('button');
  btn.className = 'option-btn ' + opt.btnClass;
  btn.textContent = opt.label;
  btn.setAttribute('role', 'listitem');
  btn.setAttribute('aria-label', 'Vote for: ' + opt.label.replace(/[^\w\s]/gi, ''));
  btn.addEventListener('click', () => castVote(opt.key, opt.label));
  optionsList.appendChild(btn);
});

function castVote(key, label) {
  const data = JSON.parse(localStorage.getItem(storageKey) || '{}');
  data[key] = (data[key] || 0) + 1;
  localStorage.setItem(storageKey, JSON.stringify(data));

  const name = document.getElementById('nickname-input').value.trim();
  showThankYou(name, label);
  fireConfetti();
}

function showThankYou(name, choice) {
  document.getElementById('poll-page').style.display = 'none';
  const thankPage = document.getElementById('thank-you-page');
  const msg = document.getElementById('thank-message');
  msg.textContent = name
    ? `Thanks ${name}! Your vote was counted.`
    : `Thanks! Your vote was counted.`;
  thankPage.classList.add('visible');
  startCountdown();
}

function startCountdown() {
  let count = 3;
  const numEl = document.getElementById('countdown-num');
  const interval = setInterval(() => {
    count--;
    numEl.textContent = count;
    if (count <= 0) {
      clearInterval(interval);
      try { window.close(); } catch(e) {}
      // Fallback if window.close() is blocked
      document.getElementById('countdown-num').closest('.countdown').textContent = 'You can close this tab.';
    }
  }, 1000);
}

function fireConfetti() {
  if (typeof confetti === 'undefined') return;
  const end = Date.now() + 2000;
  const colors = ['#2383e2', '#7c3aed', '#db2777', '#0d8478', '#ea580c'];
  (function frame() {
    confetti({
      particleCount: 6,
      angle: 60,
      spread: 55,
      origin: { x: 0 },
      colors
    });
    confetti({
      particleCount: 6,
      angle: 120,
      spread: 55,
      origin: { x: 1 },
      colors
    });
    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}
</script>
</body>
</html>
